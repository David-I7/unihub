name: unihub

services:
  postgres:
    image: 'postgres:18-alpine3.23'
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - 'POSTGRES_DB=${DATABASE_NAME}'
      - 'POSTGRES_PASSWORD=${DATABASE_PASSWORD}'
      - 'POSTGRES_USER=${DATABASE_USER}'
    ports:
      - '5432:5432'
    volumes:
      - 'postgres-data:/var/lib/postgresql'

volumes:
  postgres-data: